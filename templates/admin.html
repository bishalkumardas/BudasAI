<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BUDASAI Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #3c83f6;
            --bg: #060d1a;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.07);
            --border-focus: rgba(60, 131, 246, 0.5);
            --text: #f0f4ff;
            --muted: rgba(255, 255, 255, 0.35);
            --muted2: rgba(255, 255, 255, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(60,131,246,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(60,131,246,0.06) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% { background-position: 0 0; }
            100% { background-position: 48px 48px; }
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(60,131,246,0.15) 0%, transparent 70%);
            animation: blobFloat1 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            bottom: -80px;
            right: -80px;
            background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
            animation: blobFloat2 10s ease-in-out infinite;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(60,131,246,0.07) 0%, transparent 70%);
            animation: blobFloat3 6s ease-in-out infinite;
        }

        @keyframes blobFloat1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 20px); }
        }

        @keyframes blobFloat2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -30px); }
        }

        @keyframes blobFloat3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.15); }
        }

        .scanline {
            position: fixed;
            top: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(60,131,246,0.6), transparent);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes scan {
            0% { top: -2px; opacity: 1; }
            90% { opacity: 0.5; }
            100% { top: 100vh; opacity: 0; }
        }

        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
            pointer-events: none;
        }

        .corner-tl { top: 20px; left: 20px; border-top: 1.5px solid rgba(60,131,246,0.4); border-left: 1.5px solid rgba(60,131,246,0.4); }
        .corner-tr { top: 20px; right: 20px; border-top: 1.5px solid rgba(60,131,246,0.4); border-right: 1.5px solid rgba(60,131,246,0.4); }
        .corner-bl { bottom: 20px; left: 20px; border-bottom: 1.5px solid rgba(60,131,246,0.4); border-left: 1.5px solid rgba(60,131,246,0.4); }
        .corner-br { bottom: 20px; right: 20px; border-bottom: 1.5px solid rgba(60,131,246,0.4); border-right: 1.5px solid rgba(60,131,246,0.4); }

        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted2);
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 6px #10b981;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 2px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(60,131,246,0.3), rgba(99,102,241,0.1), rgba(60,131,246,0.05));
            animation: cardReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardReveal {
            0% { opacity: 0; transform: translateY(24px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-inner {
            background: linear-gradient(160deg, rgba(14,22,42,0.97) 0%, rgba(8,14,28,0.99) 100%);
            border-radius: 18px;
            padding: 44px 40px 40px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .card-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(60,131,246,0.7), transparent);
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeUp 0.6s ease both;
            animation-delay: 0.15s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            margin: 0 auto 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(60,131,246,0.25), rgba(60,131,246,0.1));
            border: 1px solid rgba(60,131,246,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .brand-icon svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #3c83f6;
            stroke-width: 1.8;
            stroke-linecap: round;
        }

        .brand-name {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .brand-name span { color: var(--blue); }

        .brand-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .error-box {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 22px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: fadeUp 0.3s ease both;
        }

        .error-text {
            font-size: 13px;
            color: #fca5a5;
            line-height: 1.5;
        }

        .error-text strong {
            display: block;
            color: #ef4444;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .form-group {
            margin-bottom: 18px;
            animation: fadeUp 0.6s ease both;
        }

        .form-group:nth-child(1) { animation-delay: 0.25s; }
        .form-group:nth-child(2) { animation-delay: 0.35s; }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 9px;
        }

        .label-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--blue);
            opacity: 0.7;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid var(--border);
            border-radius: 11px;
            font-size: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 500;
            color: var(--text);
            transition: all 0.25s;
            outline: none;
        }

        .input-wrap input::placeholder {
            color: rgba(255,255,255,0.2);
            font-weight: 400;
        }

        .input-wrap input:focus {
            border-color: var(--border-focus);
            background: rgba(60,131,246,0.05);
            box-shadow: 0 0 0 4px rgba(60,131,246,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted2);
            font-size: 15px;
            transition: color 0.25s;
            pointer-events: none;
        }

        .input-wrap:focus-within .input-icon {
            color: var(--blue);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 11px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            letter-spacing: 0.3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.25s;
            margin-top: 6px;
            animation: fadeUp 0.6s ease both;
            animation-delay: 0.45s;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 0.5s;
        }

        .btn-submit:hover::before { left: 100%; }

        .btn-submit:hover {
            background: #2563eb;
            box-shadow: 0 0 0 1px rgba(60,131,246,0.4), 0 8px 32px rgba(60,131,246,0.35);
            transform: translateY(-1px);
        }

        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-arrow {
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn-submit:hover .btn-arrow { transform: translateX(3px); }

        .card-footer {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeUp 0.6s ease both;
            animation-delay: 0.55s;
        }

        .footer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        .footer-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted2);
            letter-spacing: 0.3px;
        }

        .footer-text strong {
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        @media (max-width: 560px) {
            .card-inner { padding: 32px 22px 24px; }
            .status-bar { display: none; }
            .corner { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="scanline"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="status-bar">
        <div class="status-dot"></div>
        <span>sys.status: <strong style="color:rgba(255,255,255,.35)">ONLINE</strong></span>
        <span>&middot;</span>
        <span>secure_conn: <strong style="color:rgba(255,255,255,.35)">TLS 1.3</strong></span>
        <span>&middot;</span>
        <span>env: <strong style="color:rgba(255,255,255,.35)">PRODUCTION</strong></span>
    </div>

    <div class="card">
        <div class="card-inner">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div class="brand-name">BUDAS<span>AI</span></div>
                <div class="brand-sub">Admin Dashboard</div>
            </div>

            {% if error %}
            <div class="error-box">
                <div class="error-text">
                    <strong>Access Denied</strong>
                    {{ error }}
                </div>
            </div>
            {% endif %}

            <form method="post" action="/admin/login">
                <div class="form-group">
                    <label>
                        <span class="label-dot"></span>
                        Email Address
                    </label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <rect x="2" y="4" width="20" height="16" rx="3"/>
                                <path d="m2 7 10 7 10-7"/>
                            </svg>
                        </span>
                        <input
                            type="email"
                            name="email"
                            placeholder="admin@budasai.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <span class="label-dot"></span>
                        Password
                    </label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <rect x="3" y="11" width="18" height="11" rx="2"/>
                                <circle cx="12" cy="16" r="1" fill="currentColor"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input
                            type="password"
                            name="password"
                            placeholder="Enter password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <span class="btn-inner">
                        Access Dashboard
                        <span class="btn-arrow">-&gt;</span>
                    </span>
                </button>
            </form>

            <div class="card-footer">
                <div class="footer-dot"></div>
                <span class="footer-text">budasai.com <strong>restricted area</strong></span>
            </div>
        </div>
    </div>
</body>
</html>
